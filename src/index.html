<!DOCTYPE html>
<html>
	<head>
	  <title>ASCII Design</title>
    <meta http-equiv="Content-Security-Policy" content="
  default-src
    'self';
  connect-src
    'self';
  script-src
    'self'
    'unsafe-eval'
    'unsafe-inline';
  font-src
    'self';
  frame-src
    'self';
  img-src
    'self'
    data:
    blob:;
  style-src
    'self'
    'unsafe-inline';
  worker-src
    'self';
    ">

    <link rel="stylesheet" type="text/css" href="canvas.css">
    <link rel="stylesheet" type="text/css" href="ascii.design.css">
    <script>
      function init() {
        import('./ascii.design.js').then(ascii_design => {
          ascii_design.init()
          window['ascii_design'] = ascii_design
        })
      }
      window.addEventListener('DOMContentLoaded',init)
    </script>
    <!--
       <script src="ascii.design.js" charset="UTF-8"></script>
       -->
	</head>
	<body>
    <div class="menu">
      <img type="image/svg+xml" src="cursor.svg" class="icon" data-tool="SelectTool" />
      <img type="image/svg+xml" src="box.svg" class="icon" data-tool="BoxTool" />
      <img type="image/svg+xml" src="line.svg" class="icon" data-tool="LineTool"  />
      <img type="image/svg+xml" src="pen.svg" class="icon" data-tool="PenTool" />
      <img type="image/svg+xml" src="text.svg" class="icon" data-tool="TextTool"  />
      <img src="clear.svg" class="action" data-action="clear" title="Clear canvas" />
    </div>
    <canvas id="canvas" width="150" height="150"></canvas>
    <div id="status"><span id="position">(   ,   )</span><span id="zoom">100%</span><span id="help"></span></div>
    <div id="canvasStyle">
      <div id="grid"></div>
    </div>
	</body>
</html>
